version: '3.8'

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: taxlens
      POSTGRES_PASSWORD: taxlens
      POSTGRES_DB: taxlens
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taxlens -d taxlens"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - backend

  # mock-services:
  #   image: taxlens-mock:latest   # TODO: P5 builds this image
  #   ports:
  #     - "8001:8001"
  #   # Provides mock invoice and case-management APIs at localhost:8001

volumes:
  pgdata:
